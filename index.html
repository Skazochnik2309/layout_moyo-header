
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Moyo header</title>
    <link
      rel="stylesheet"
      href="src/style.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <a
          class="logo_link"
          href="#"
        >
          <img
            class="logo_img"
            src="images/logo.png"
            alt="Logo"
          />
        </a>
        <nav class="nav">
          <ul class="nav_list">
            <li class="nav_item">
              <a
                class="nav_link apple is-active"
                href="#"
              >
                Apple
              </a>
            </li>
            <li class="nav_item">
              <a
                class="nav_link"
                href="#"
              >
                Samsung
              </a>
            </li>
            <li class="nav_item">
              <a
                class="nav_link"
                href="#"
              >
                Smartphones
              </a>
            </li>
            <li class="nav_item">
              <a
                data-qa="hover"
                class="nav_link"
                href="#"
              >
                Laptops & Computers
              </a>
            </li>
            <li class="nav_item">
              <a
                class="nav_link"
                href="#"
              >
                Photo
              </a>
            </li>
            <li class="nav_item">
              <a
                class="nav_link"
                href="#"
              >
                Video
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </header>
  </body>
</html>
